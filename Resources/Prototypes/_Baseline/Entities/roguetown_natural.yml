- type: entity
  parent: FoodInjectableBase
  id: RogueTownBerries
  name: jacksberries
  categories: [ ForkFiltered ]
  description: A small handful of wild berries.
  components:
  - type: FlavorProfile
    flavors:
    - berry
  - type: Sprite
    sprite: _Baseline/RogueTown/Items/natural.rsi
    state: berries
  - type: Item
    size: Tiny
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 3
        reagents:
        - ReagentId: Nutriment
          Quantity: 3

- type: entity
  parent: BaseItem
  id: RogueTownFibers
  name: fibers
  categories: [ ForkFiltered ]
  description: A handful of tough natural fibers.
  components:
  - type: Sprite
    sprite: _Baseline/RogueTown/Items/natural.rsi
    state: fibers
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - RogueTownFiber

- type: entity
  parent: BaseItem
  id: RogueTownThorn
  name: thorn
  categories: [ ForkFiltered ]
  description: A long, sharp thorn.
  components:
  - type: Sprite
    sprite: _Baseline/RogueTown/Items/natural.rsi
    state: thorn
  - type: Item
    size: Tiny
  - type: MeleeWeapon
    damage:
      types:
        Piercing: 10
  - type: Tag
    tags:
    - RogueTownThorn

- type: entity
  parent: BaseItem
  id: RogueTownCloth
  name: cloth
  categories: [ ForkFiltered ]
  description: A small piece of rough woven cloth. Once a wound is stitched closed, this can slowly treat the injury.
  components:
  - type: Sprite
    sprite: _Baseline/RogueTown/Items/natural.rsi
    state: cloth
  - type: Item
    size: Tiny
  - type: Healing
    damageContainers:
    - Biological
    damage:
      types:
        Blunt: -1
        Slash: -1
        Piercing: -1
    delay: 5
    selfHealPenaltyMultiplier: 1
    requireNoBleeding: true
    appliesBandage: true
    healingBeginSound:
      path: /Audio/Items/Medical/brutepack_begin.ogg
    healingEndSound:
      path: /Audio/Items/Medical/brutepack_end.ogg
  - type: Construction
    graph: RogueTownCloth
    node: cloth

- type: entity
  parent: BaseItem
  id: RogueTownThornNeedle
  name: thorn needle
  categories: [ ForkFiltered ]
  description: A thorn bound with fiber into a crude sewing needle. It can stitch a bleeding wound closed, but does not heal the injury.
  components:
  - type: Sprite
    sprite: _Baseline/RogueTown/Items/natural.rsi
    state: thorn-needle
  - type: Item
    size: Tiny
  - type: MeleeWeapon
    damage:
      types:
        Piercing: 1
  - type: Healing
    damageContainers:
    - Biological
    damage: {}
    bloodlossModifier: -10
    delay: 5
    selfHealPenaltyMultiplier: 1
    consumeOnUse: false
    stitchesWound: true
    healingBeginSound:
      path: /Audio/Items/Medical/brutepack_begin.ogg
    healingEndSound:
      path: /Audio/Items/Medical/brutepack_end.ogg
  - type: Construction
    graph: RogueTownThornNeedle
    node: thornNeedle
