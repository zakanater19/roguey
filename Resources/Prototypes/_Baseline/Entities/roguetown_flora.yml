- type: entity
  parent: BaseTree
  id: FloraTreeRogueTownStatic
  name: dead tree
  suffix: RogueTown, Static
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    sprite: _Baseline/RogueTown/Flora/rogue_trees_static.rsi
    offset: 0,0.9
    layers:
    - state: roguetown_tree01
      map: ["random"]
  - type: RandomSprite
    available:
    - random:
        roguetown_tree01: ""
  - type: RogueTownMiningWall
    requiredToolTag: Axe
    alternativeToolTag: Sword
    toolDamage: 200
    alternativeToolDamage: 133.34
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/tree_fell.ogg
          params:
            volume: 5
            variation: 0.05
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          RogueTownSmallLog:
            min: 4
            max: 5
