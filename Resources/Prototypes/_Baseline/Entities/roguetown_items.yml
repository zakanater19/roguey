- type: entity
  parent: BaseSword
  id: RogueIronArmingSword
  name: iron arming sword
  categories: [ ForkFiltered ]
  description: A long iron blade with a simple crossguard. Cheaper than steel, but still made for war.
  components:
  - type: Tag
    tags:
    - Sword
  - type: Sprite
    sprite: _Baseline/RogueTown/Weapons/iron_arming_sword.rsi
  - type: MeleeWeapon
    damage:
      types:
        Slash: 15
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Item
    size: Normal
    shape:
    - 0,0,0,3
  - type: DisarmMalus

