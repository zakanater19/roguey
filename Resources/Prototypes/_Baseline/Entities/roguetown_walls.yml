- type: entity
  parent: BaseWall
  id: RogueTownStoneWall
  name: stone wall
  categories: [ ForkFiltered ]
  description: A heavy wall of worked stone.
  components:
  - type: Transform
    anchored: true
  - type: Anchorable
    flags: None
  - type: Sprite
    sprite: _Baseline/RogueTown/Walls/stone_wall.rsi
    layers:
    - state: full
  - type: Icon
    sprite: _Baseline/RogueTown/Walls/stone_wall.rsi
    state: full
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Rock
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/break_stone.ogg
          params:
            volume: -6
  - type: RogueTownMiningWall
  - type: Construction
    graph: RogueTownStoneWall
    node: stoneWall

- type: entity
  parent: BaseWall
  id: RogueTownRockWall
  name: rock
  categories: [ ForkFiltered ]
  description: A rough wall of natural rock.
  components:
  - type: Transform
    anchored: true
  - type: Anchorable
    flags: None
  - type: Sprite
    sprite: _Baseline/RogueTown/Walls/rock_wall.rsi
    layers:
    - state: full
  - type: Icon
    sprite: _Baseline/RogueTown/Walls/rock_wall.rsi
    state: full
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Rock
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 13
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/break_stone.ogg
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          RogueTownStone:
            min: 1
            max: 3
  - type: RogueTownMiningWall
    extraDrops:
    - entity: RogueTownCoal
      probability: 0.10
    - entity: RogueTownIronOre
      probability: 0.05

- type: entity
  parent: BaseWall
  id: RogueTownPlankWall
  name: plank wall
  categories: [ ForkFiltered ]
  description: A rough-hewn wall of wooden planks.
  components:
  - type: Transform
    anchored: true
  - type: Anchorable
    flags: None
  - type: Sprite
    sprite: _Baseline/RogueTown/Walls/plank_wall.rsi
    layers:
    - state: full
  - type: Icon
    sprite: _Baseline/RogueTown/Walls/plank_wall.rsi
    state: full
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroyHeavy

- type: entity
  parent: RogueTownPlankWall
  id: RogueTownWoodenWindowWall
  name: wooden window wall
  description: A solid wooden wall with an open window that lets sight and light through.
  components:
  - type: Sprite
    sprite: _Baseline/RogueTown/Walls/wooden_window.rsi
    layers:
    - state: full
  - type: Icon
    sprite: _Baseline/RogueTown/Walls/wooden_window.rsi
    state: full
  - type: Occluder
    enabled: false
